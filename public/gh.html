<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的跑步记录</title>
    <style>
        :root {
            --color-bg: #ffffff;
            --color-text: #24292f;
            --color-text-muted: #57606a;
            --color-border: #d0d7de;
            --color-primary: #0969da;
            --color-primary-hover: #035cc5;
            --color-calendar-0: #ebedf0;
            --color-calendar-1: #9be9a8;
            --color-calendar-2: #40c463;
            --color-calendar-3: #30a14e;
            --color-calendar-4: #216e39;
            --color-bar: #00bfff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: var(--color-text);
            background-color: var(--color-bg);
            line-height: 1.5;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        a { color: var(--color-primary); text-decoration: none; cursor: pointer; }
        a:hover { text-decoration: underline; }

        /* Navigation / Overview */
        .header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--color-border); }
        .stats-overview { display: flex; gap: 20px; margin-top: 10px; font-size: 14px; color: var(--color-text-muted); flex-wrap: wrap; }
        .stats-overview strong { color: var(--color-text); font-size: 16px; }

        /* Heatmap Section */
        .heatmap-wrapper { display: flex; flex-direction: column-reverse; gap: 20px; margin-bottom: 30px; }
        @media (min-width: 768px) {
            .heatmap-wrapper { flex-direction: row; }
        }

        .heatmap-container {
            flex: 1;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            padding: 15px;
            overflow-x: auto;
        }

        .heatmap-title { margin-bottom: 10px; font-size: 14px; color: var(--color-text); }
        
        .heatmap-grid {
            display: grid;
            grid-template-rows: repeat(7, 12px);
            grid-auto-flow: column;
            gap: 3px;
            width: fit-content;
        }

        .heatmap-cell {
            width: 12px; height: 12px;
            border-radius: 2px;
            background-color: var(--color-calendar-0);
            position: relative;
        }
        .heatmap-cell[data-level="1"] { background-color: var(--color-calendar-1); }
        .heatmap-cell[data-level="2"] { background-color: var(--color-calendar-2); }
        .heatmap-cell[data-level="3"] { background-color: var(--color-calendar-3); }
        .heatmap-cell[data-level="4"] { background-color: var(--color-calendar-4); }

        .heatmap-cell:hover::after {
            content: attr(data-title);
            position: absolute;
            bottom: 100%; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
            margin-bottom: 4px;
        }

        .year-selector { display: flex; flex-direction: row; gap: 8px; flex-wrap: wrap; }
        @media (min-width: 768px) {
            .year-selector { flex-direction: column; width: 100px; }
        }
        .year-btn {
            padding: 6px 12px;
            border: none; border-radius: 6px;
            background: transparent; color: var(--color-text);
            cursor: pointer; font-size: 14px; text-align: left;
        }
        .year-btn.active { background-color: var(--color-primary); color: white; }

        /* Month List (图2样式) */
        .section-title { font-size: 20px; font-weight: normal; margin-bottom: 8px; }
        .section-subtitle { font-size: 14px; color: var(--color-text-muted); margin-bottom: 20px; }
        
        .month-item { margin-bottom: 15px; cursor: pointer; }
        .month-item:hover .month-header { color: var(--color-primary); }
        .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .month-name { font-size: 16px; }
        .month-stats { font-size: 13px; color: var(--color-text-muted); }
        .month-stats span { margin-left: 10px; }
        .month-stats .dist { color: var(--color-bar); font-size: 14px; font-weight: bold; }
        .progress-bar-bg { background-color: var(--color-calendar-0); height: 4px; border-radius: 2px; width: 100%; overflow: hidden; }
        .progress-bar-fill { background-color: var(--color-bar); height: 100%; }

        /* Daily List (图3样式) */
        .monthly-summary { display: flex; justify-content: space-around; text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .monthly-summary div { display: flex; flex-direction: column; gap: 5px; }
        .monthly-summary .val { font-size: 20px; color: var(--color-primary); }
        .monthly-summary .val.dist { color: var(--color-primary); }
        .monthly-summary .val.pace { color: var(--color-bar); }
        .monthly-summary .label { font-size: 12px; color: var(--color-text-muted); }

        .run-item { border-bottom: 1px solid var(--color-border); padding: 16px 0; }
        .run-date-city { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; }
        .run-date { font-weight: 500; font-size: 16px; }
        .run-city { color: var(--color-text-muted); }
        .run-details { display: flex; justify-content: space-between; font-size: 13px; color: var(--color-text-muted); flex-wrap: wrap; gap: 10px; }
        .run-details div { display: flex; flex-direction: row; gap: 4px; align-items: center; }
        .run-details .label { color: var(--color-text-muted); }
        .run-details .val { color: var(--color-text); font-weight: 500; }

        .breadcrumb { font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏃 我的跑步记录</h1>
        <div id="stats-overview" class="stats-overview">
            </div>
    </div>

    <div id="app-content">
        </div>

<script>
    // --- 核心配置 ---
    const DATA_URL = 'https://run.linwn.net/data/all.json';
    const BASE_PATH = '/gh'; // 基础路径
    let rawData = [];
    let processedData = {
        totalDistance: 0,
        totalRuns: 0,
        years: {} // { "2026": { runs: [], totalDistance: 0, months: { "03": [] } } }
    };

    // --- 工具函数 ---
    const formatDistance = (meters) => (meters / 1000).toFixed(2);
    
    const formatTime = (timeStr) => {
        // 解析 "0:31:40.510000" 或秒数
        let totalSeconds = 0;
        if (typeof timeStr === 'string' && timeStr.includes(':')) {
            const parts = timeStr.split(':');
            totalSeconds = parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseFloat(parts[2]);
        } else {
            totalSeconds = parseFloat(timeStr);
        }
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = Math.floor(totalSeconds % 60);
        
        if (h > 0) return `${h}h ${m}m`;
        return `${m}m ${s}s`;
    };

    const formatPace = (speed) => {
        if (!speed || speed <= 0) return "0'00\"";
        const paceSeconds = 1000 / speed;
        const m = Math.floor(paceSeconds / 60);
        const s = Math.floor(paceSeconds % 60).toString().padStart(2, '0');
        return `${m}'${s}"`;
    };

    // --- 数据处理 ---
    async function fetchData() {
        try {
            const response = await fetch(DATA_URL);
            rawData = await response.json();
            processRawData();
            handleRoute();
        } catch (error) {
            document.getElementById('app-content').innerHTML = `<p style="color:red;">获取数据失败: ${error.message}</p>`;
        }
    }

    function processRawData() {
        rawData.sort((a, b) => new Date(b.start_date_local) - new Date(a.start_date_local));
        
        rawData.forEach(run => {
            const date = new Date(run.start_date_local);
            const year = date.getFullYear().toString();
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const dateStr = date.toISOString().split('T')[0];

            if (!processedData.years[year]) {
                processedData.years[year] = { totalDistance: 0, totalTime: 0, totalRuns: 0, months: {}, daily: {} };
            }
            if (!processedData.years[year].months[month]) {
                processedData.years[year].months[month] = { runs: [], totalDistance: 0, totalTime: 0, totalRuns: 0 };
            }

            processedData.totalDistance += run.distance;
            processedData.totalRuns += 1;
            
            processedData.years[year].totalDistance += run.distance;
            processedData.years[year].totalRuns += 1;
            
            // 时间计算
            let totalSeconds = 0;
            if (typeof run.moving_time === 'string' && run.moving_time.includes(':')) {
                const parts = run.moving_time.split(':');
                totalSeconds = parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseFloat(parts[2]);
            }
            processedData.years[year].totalTime += totalSeconds;

            processedData.years[year].months[month].runs.push(run);
            processedData.years[year].months[month].totalDistance += run.distance;
            processedData.years[year].months[month].totalTime += totalSeconds;
            processedData.years[year].months[month].totalRuns += 1;

            if(!processedData.years[year].daily[dateStr]) processedData.years[year].daily[dateStr] = 0;
            processedData.years[year].daily[dateStr] += run.distance;
        });

        renderOverview();
    }

    // --- 路由系统 ---
    function navigateTo(path) {
        window.history.pushState({}, '', path);
        handleRoute();
    }

    window.addEventListener('popstate', handleRoute);

    function handleRoute() {
        const path = window.location.pathname;
        let routePath = path.replace(BASE_PATH, '');
        if (routePath.startsWith('/')) routePath = routePath.substring(1);
        
        const parts = routePath.split('/').filter(Boolean);
        
        if (parts.length === 0) {
            // 默认展示最近的一年
            const years = Object.keys(processedData.years).sort((a,b) => b-a);
            if(years.length > 0) renderYearView(years[0]);
        } else if (parts.length === 1) {
            // /gh/YYYY
            renderYearView(parts[0]);
        } else if (parts.length === 2) {
            // /gh/YYYY/MM
            renderMonthView(parts[0], parts[1]);
        }
    }

    // --- 渲染函数 ---
    function renderOverview() {
        let html = `<div>总计里程: <strong>${formatDistance(processedData.totalDistance)} km</strong></div>`;
        html += `<div>总次数: <strong>${processedData.totalRuns} 次</strong></div>`;
        const years = Object.keys(processedData.years).sort((a, b) => b - a);
        years.forEach(year => {
            html += `<div>${year}年: <strong>${formatDistance(processedData.years[year].totalDistance)} km</strong></div>`;
        });
        document.getElementById('stats-overview').innerHTML = html;
    }

    function renderYearView(year) {
        if (!processedData.years[year]) {
            document.getElementById('app-content').innerHTML = '<p>没有该年份的数据</p>';
            return;
        }

        const yearData = processedData.years[year];
        const yearsList = Object.keys(processedData.years).sort((a, b) => b - a);

        let html = `
            <div class="heatmap-wrapper">
                <div class="heatmap-container">
                    <div class="heatmap-title">${yearData.totalRuns} contributions in ${year}</div>
                    ${generateHeatmap(year)}
                </div>
                <div class="year-selector">
                    ${yearsList.map(y => `<button class="year-btn ${y === year ? 'active' : ''}" onclick="navigateTo('${BASE_PATH}/${y}')">${y}</button>`).join('')}
                </div>
            </div>
            
            <h2 class="section-title">${year} 年</h2>
            <div class="section-subtitle">共奔跑 ${yearData.totalRuns} 次，累计 ${formatDistance(yearData.totalDistance)} 公里</div>
            <div class="month-list">
        `;

        const months = Object.keys(yearData.months).sort((a, b) => b - a);
        const maxMonthDist = Math.max(...months.map(m => yearData.months[m].totalDistance));

        months.forEach(month => {
            const mData = yearData.months[month];
            const percent = (mData.totalDistance / maxMonthDist) * 100;
            const avgSpeed = mData.runs.reduce((sum, r) => sum + r.average_speed, 0) / mData.runs.length;

            html += `
                <div class="month-item" onclick="navigateTo('${BASE_PATH}/${year}/${month}')">
                    <div class="month-header">
                        <div class="month-name">${parseInt(month)} 月</div>
                        <div class="month-stats">
                            <span class="dist">${formatDistance(mData.totalDistance)} km</span>
                            <span>· ${formatTime(mData.totalTime)}</span>
                            <span>· ${formatPace(avgSpeed)}</span>
                            <span>· ${mData.totalRuns}次</span>
                        </div>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${percent}%"></div>
                    </div>
                </div>
            `;
        });

        html += `</div>`;
        document.getElementById('app-content').innerHTML = html;
    }

    function renderMonthView(year, month) {
        const mData = processedData.years[year]?.months[month];
        if (!mData) {
            document.getElementById('app-content').innerHTML = '<p>没有该月份的数据</p>';
            return;
        }

        const avgSpeed = mData.runs.reduce((sum, r) => sum + r.average_speed, 0) / mData.runs.length;

        let html = `
            <div class="breadcrumb">
                <a onclick="navigateTo('${BASE_PATH}/${year}')">← 返回 ${year} 年概览</a>
            </div>
            <h2 class="section-title">${parseInt(month)} 月统计</h2>
            
            <div class="monthly-summary">
                <div>
                    <span class="val">${formatTime(mData.totalTime)}</span>
                    <span class="label">总用时</span>
                </div>
                <div>
                    <span class="val dist">${formatDistance(mData.totalDistance)}km</span>
                    <span class="label">总距离</span>
                </div>
                <div>
                    <span class="val pace">${formatPace(avgSpeed)}</span>
                    <span class="label">平均配速</span>
                </div>
            </div>

            <div class="section-subtitle" style="margin-bottom: 10px;">${mData.totalRuns} 次跑步</div>
            <div class="run-list">
        `;

        mData.runs.forEach(run => {
            const date = new Date(run.start_date_local);
            const dateStr = `${date.getMonth() + 1}月${date.getDate()}日`;
            const hr = run.average_heartrate ? `${Math.round(run.average_heartrate)} bpm` : '--';
            const runTime = run.moving_time.toString().split('.')[0]; // 去掉毫秒

            html += `
                <div class="run-item">
                    <div class="run-date-city">
                        <span class="run-date">${dateStr}</span>
                        <span class="run-city">${run.city || '未知城市'}</span>
                    </div>
                    <div class="run-details">
                        <div><span class="label">距离:</span> <span class="val">${formatDistance(run.distance)} km</span></div>
                        <div><span class="label">用时:</span> <span class="val">${runTime}</span></div>
                        <div><span class="label">配速:</span> <span class="val">${formatPace(run.average_speed)}</span></div>
                        <div><span class="label">心率:</span> <span class="val">${hr}</span></div>
                    </div>
                </div>
            `;
        });

        html += `</div>`;
        document.getElementById('app-content').innerHTML = html;
    }

    function generateHeatmap(year) {
        const yearData = processedData.years[year];
        const startDate = new Date(year, 0, 1);
        const endDate = new Date(year, 11, 31);
        
        let html = '<div class="heatmap-grid">';
        
        // 填充1月1日之前的空白天数 (星期日为0，这里假设星期一为一周开始，Github默认是周日)
        const startDayOfWeek = startDate.getDay(); 
        for (let i = 0; i < startDayOfWeek; i++) {
            html += `<div class="heatmap-cell" style="background: transparent;"></div>`;
        }

        for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
            const dateStr = d.toISOString().split('T')[0];
            const dist = yearData.daily[dateStr] || 0;
            const distKm = dist / 1000;
            
            let level = 0;
            if (distKm > 0 && distKm < 5) level = 1;
            else if (distKm >= 5 && distKm < 10) level = 2;
            else if (distKm >= 10 && distKm < 20) level = 3;
            else if (distKm >= 20) level = 4;

            const title = distKm > 0 ? `${dateStr}: ${distKm.toFixed(2)} km` : `No runs on ${dateStr}`;
            html += `<div class="heatmap-cell" data-level="${level}" data-title="${title}"></div>`;
        }
        
        html += '</div>';
        return html;
    }

    // --- 初始化 ---
    // 为了防止在没有后端路由支持的情况下刷新 404，如果是本地双击打开或者在没有服务器配置的情况
    // 这段脚本会根据当前真实 URL 解析，如果用户直接访问 /gh/2026/03 但服务器不支持，则需要 Nginx 配置 fallback 到 index.html。
    fetchData();

</script>
</body>
</html>
