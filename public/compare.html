<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>年度跑量对比 - 纵向增强版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
    <style>
        :root {
--bg-color: #0b0f19;
            --card-bg: rgba(22, 27, 34, 0.65);
            --text-main: #e2e8f0;
            --color-left: #3b82f6; 
            --color-right: #10b981; 
            --border: #30363d;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; 
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 8px;
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            height: 3vh;
            font-size: 0.85rem;
            font-weight: bold;
            color: #8b949e;
            letter-spacing: 1px;
        }

        .selectors {
            display: flex;
            justify-content: space-around;
            height: 5vh;
            align-items: center;
        }

        select {
            background: #21262d;
            color: white;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.85rem;
        }

        /* 统计卡片区域 - 略微增加高度以容纳新项 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            height: 22vh; 
            margin-bottom: 8px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 1rem;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat-card.left { border-left: 4px solid var(--color-left); }
        .stat-card.right { border-left: 4px solid var(--color-right); }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .label { color: #94a3b8; }
        .val { font-weight: bold; color: #f0f6fc; }
        .year-title { font-weight: bold; font-size: 0.85rem; margin-bottom: 4px; border-bottom: 1px solid #30363d; padding-bottom: 2px;}

        /* 图表区域 */
        .chart-box {
            flex: 1;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            position: relative;
            padding: 5px 5px 5px 0px;
        }

        canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

<div class="app-container">
    <header>ANALYSIS COMPARISON</header>

    <div class="selectors">
        <select id="year1"></select>
        <span style="font-size: 0.7rem; color: #8b949e;">VS</span>
        <select id="year2"></select>
    </div>

    <div class="stats-grid">
        <div class="stat-card left">
            <div class="year-title" id="y1-label" style="color:var(--color-left)">-</div>
            <div class="stat-row"><span class="label">总里程</span><span class="val" id="y1-dist">-</span></div>
            <div class="stat-row"><span class="label">单日最高</span><span class="val" id="y1-max">-</span></div>
            <div class="stat-row"><span class="label">平均配速</span><span class="val" id="y1-pace">-</span></div>
            <div class="stat-row"><span class="label">最快配速</span><span class="val" id="y1-best">-</span></div>
            <div class="stat-row"><span class="label">全/半马</span><span class="val" id="y1-m">-</span></div>
        </div>
        <div class="stat-card right">
            <div class="year-title" id="y2-label" style="color:var(--color-right)">-</div>
            <div class="stat-row"><span class="label">总里程</span><span class="val" id="y2-dist">-</span></div>
            <div class="stat-row"><span class="label">单日最高</span><span class="val" id="y2-max">-</span></div>
            <div class="stat-row"><span class="label">平均配速</span><span class="val" id="y2-pace">-</span></div>
            <div class="stat-row"><span class="label">最快配速</span><span class="val" id="y2-best">-</span></div>
            <div class="stat-row"><span class="label">全/半马</span><span class="val" id="y2-m">-</span></div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="dayChart"></canvas>
    </div>
</div>

<script>
    const DATA_URL = 'https://run.linwn.net/data/all.json';
    let rawData = [];
    let myChart = null;

    async function init() {
        try {
            const resp = await fetch(DATA_URL);
            rawData = await resp.json();
            const years = [...new Set(rawData.map(r => new Date(r.start_date_local).getFullYear()))].sort((a,b)=>b-a);
            const s1 = document.getElementById('year1');
            const s2 = document.getElementById('year2');
            years.forEach(y => { s1.add(new Option(y, y)); s2.add(new Option(y, y)); });
            if(years.length >= 2) { s1.value = years[0]; s2.value = years[1]; }
            s1.onchange = update; s2.onchange = update;
            update();
        } catch(e) { console.error(e); }
    }

    function processYear(year) {
        const days = new Array(366).fill(0);
        const filtered = rawData.filter(r => r.type === 'Run' && new Date(r.start_date_local).getFullYear() == year);
        
        let totalDist = 0, totalSec = 0, hm = 0, fm = 0;
        let bestPaceSec = Infinity;

        filtered.forEach(r => {
            const date = new Date(r.start_date_local);
            const start = new Date(date.getFullYear(), 0, 0);
            const dIdx = Math.floor((date - start) / (1000 * 60 * 60 * 24)) - 1;
            const distKm = r.distance / 1000;
            
            if(dIdx >= 0 && dIdx < 366) days[dIdx] += distKm;
            
            totalDist += distKm;
            const t = r.moving_time.split(':').map(Number);
            const runSec = (t[0]*3600 + t[1]*60 + t[2]);
            totalSec += runSec;

            // 计算单次最快配速
            const currentPace = runSec / distKm;
            if (currentPace < bestPaceSec && distKm > 1) { // 过滤掉小于1公里的极端数据
                bestPaceSec = currentPace;
            }

            if(distKm >= 42.195) fm++; else if(distKm >= 21.0975) hm++;
        });

        const maxDay = Math.max(...days).toFixed(1);

        return { 
            days, 
            totalDist: totalDist.toFixed(1), 
            maxDay,
            avgPace: totalDist > 0 ? formatPace(totalSec / totalDist) : '-', 
            bestPace: bestPaceSec !== Infinity ? formatPace(bestPaceSec) : '-',
            m: `${fm}/${hm}` 
        };
    }

    function formatPace(s) {
        const m = Math.floor(s / 60);
        const sec = Math.round(s % 60);
        return `${m}'${sec.toString().padStart(2, '0')}''`;
    }

    function update() {
        const y1 = document.getElementById('year1').value;
        const y2 = document.getElementById('year2').value;
        const d1 = processYear(y1);
        const d2 = processYear(y2);

        // 更新 UI
        const setStats = (prefix, data) => {
            document.getElementById(`${prefix}-dist`).innerText = data.totalDist + 'k';
            document.getElementById(`${prefix}-max`).innerText = data.maxDay + 'k';
            document.getElementById(`${prefix}-pace`).innerText = data.avgPace;
            document.getElementById(`${prefix}-best`).innerText = data.bestPace;
            document.getElementById(`${prefix}-m`).innerText = data.m;
        };

        document.getElementById('y1-label').innerText = y1;
        document.getElementById('y2-label').innerText = y2;
        setStats('y1', d1);
        setStats('y2', d2);

        renderChart(d1.days, d2.days, y1, y2);
    }

function renderChart(d1, d2, y1, y2) {
        const ctx = document.getElementById('dayChart').getContext('2d');
        if(myChart) myChart.destroy();

        const labels = Array.from({length: 366}, (_, i) => {
            const monthStarts = [0, 31, 60, 91, 121, 152, 182, 213, 244, 274, 305, 335];
            const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const idx = monthStarts.indexOf(i);
            return idx !== -1 ? monthNames[idx] : '';
        });

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: y1,
                        data: d1.map(v => -v),
                        backgroundColor: '#3b82f6',
                        borderRadius: 4, // 增加圆角
                        barPercentage: 1, 
                        categoryPercentage: 0.9,
                    },
                    {
                        label: y2,
                        data: d2,
                        backgroundColor: '#10b981',
                        borderRadius: 4, // 增加圆角
                        barPercentage: 1, 
                        categoryPercentage: 0.9,
                    }
                ]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: { 
                    legend: { display: false }, 
                    tooltip: { 
                        enabled: true,
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        titleFont: { family: 'Inter', size: 13 },
                        bodyFont: { family: 'JetBrains Mono', size: 12 },
                        padding: 10,
                        cornerRadius: 8,
                        callbacks: {
                            // 修复悬浮提示框显示负数的问题
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) { label += ': '; }
                                if (context.parsed.x !== null) {
                                    label += Math.abs(context.parsed.x).toFixed(1) + ' km';
                                }
                                return label;
                            }
                        }
                    } 
                },
                scales: {
                    x: { 
                        min: -50, max: 50,
                        ticks: {
                            callback: v => Math.abs(v) + (v === 50 || v === -50 ? ' km' : ''),
                            stepSize: 21,
                            font: { family: 'JetBrains Mono', size: 10 },
                            color: '#94a3b8'
                        },
                        grid: { 
                            color: 'rgba(255, 255, 255, 0.05)',
                            drawBorder: false
                        }
                    },
                    y: {
                        position: 'right',
                        ticks: {
                            autoSkip: false,
                            font: { family: 'Inter', size: 10, weight: 'bold' },
                            color: '#e2e8f0',
                            padding: 8
                        },
                        grid: { display: false, drawBorder: false }
                    }
                }
            }
        });
    }

    init();
</script>
</body>
</html>
