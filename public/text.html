<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑步记录</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --line-color: #e5e7eb;
            --accent-color: #111827;
            --control-bg: #f3f4f6;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-primary: #f8fafc;
                --text-secondary: #94a3b8;
                --text-tertiary: #64748b;
                --line-color: #334155;
                --accent-color: #f8fafc;
                --control-bg: #1e293b;
            }
        }
        
        body {
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            max-width: 640px;
            margin: 0 auto;
            padding: 40px 24px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 顶部统计 */
        .summary-card {
            margin-bottom: 32px;
        }
        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            margin: 0 0 8px 0;
        }
        .summary-stats {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
        }

        /* 控制区 */
        .drill-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--line-color);
        }
        .drill-controls label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .drill-controls label:hover {
            color: var(--text-primary);
        }
        .drill-controls label.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .drill-controls input[type="checkbox"] {
            accent-color: var(--accent-color);
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: inherit;
        }

        /* 列表层级样式 */
        .year-block {
            margin-bottom: 40px;
        }
        .year-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        
        .month-list {
            padding-left: 0;
        }
        .month-block {
            margin-bottom: 24px;
        }
        .month-title {
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            color: var(--text-primary);
        }

        .day-list {
            padding-left: 0;
        }
        .day-block {
            margin-bottom: 16px;
        }
        .day-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .stats-inline {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-tertiary);
            font-variant-numeric: tabular-nums;
        }

        /* 每次跑步的时间轴 UI */
        .run-list {
            list-style: none;
            padding: 0;
            margin: 0 0 0 4px;
            border-left: 2px solid var(--line-color);
        }
        .run-item {
            position: relative;
            padding: 12px 0 12px 20px;
        }
        .run-item::before {
            content: '';
            position: absolute;
            left: -5px;
            top: 18px;
            width: 8px;
            height: 8px;
            background: var(--bg-color);
            border: 2px solid var(--text-tertiary);
            border-radius: 50%;
            transition: border-color 0.2s;
        }
        .run-item:hover::before {
            border-color: var(--text-primary);
        }
        .run-header {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .run-stats-detail {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        .loading {
            color: var(--text-secondary);
            text-align: center;
            margin-top: 40px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="loading">正在加载数据...</div>
    </div>

    <script>
        const API_URL = 'https://run.linwn.net/data/all.json';
        
        let parsedData = { total: { dist: 0, count: 0 }, years: {} };
        
        // 核心状态控制：默认全展开（全不收起）
        let collapseMonths = false;
        let collapseDays = false;
        let collapseRuns = false;

        // ---------- 数据解析与工具 ----------

        function padZero(num) { 
            return num.toString().padStart(2, '0'); 
        }

        // 格式化时间为更干净的 1:20:05 风格
        function formatTime(timeStr) {
            if (!timeStr) return '-';
            const parts = timeStr.split(':');
            const h = parseInt(parts[0], 10);
            const m = parseInt(parts[1], 10);
            const s = parseInt(parts[2], 10);
            return h > 0 ? `${h}:${padZero(m)}:${padZero(s)}` : `${m}:${padZero(s)}`;
        }
        
        // 配速格式化
        function formatPace(speedMS) {
            if (!speedMS) return '-';
            const secPerKm = 1000 / speedMS;
            return `${Math.floor(secPerKm / 60)}'${Math.floor(secPerKm % 60).toString().padStart(2, '0')}"`;
        }

        async function init() {
            try {
                const res = await fetch(API_URL);
                const rawData = await res.json();
                rawData.sort((a, b) => new Date(b.start_date_local.replace(' ', 'T')) - new Date(a.start_date_local.replace(' ', 'T')));

                rawData.forEach(run => {
                    const date = new Date(run.start_date_local.replace(' ', 'T'));
                    const year = date.getFullYear().toString();
                    const month = date.getMonth() + 1;
                    const day = date.getDate();
                    const distKm = run.distance / 1000;

                    parsedData.total.dist += distKm;
                    parsedData.total.count++;

                    if (!parsedData.years[year]) parsedData.years[year] = { dist: 0, count: 0, months: {} };
                    parsedData.years[year].dist += distKm;
                    parsedData.years[year].count++;

                    if (!parsedData.years[year].months[month]) parsedData.years[year].months[month] = { dist: 0, count: 0, days: {} };
                    parsedData.years[year].months[month].dist += distKm;
                    parsedData.years[year].months[month].count++;

                    if (!parsedData.years[year].months[month].days[day]) parsedData.years[year].months[month].days[day] = { dist: 0, count: 0, runs: [] };
                    parsedData.years[year].months[month].days[day].dist += distKm;
                    parsedData.years[year].months[month].days[day].count++;
                    parsedData.years[year].months[month].days[day].runs.push(run);
                });

                renderApp();
            } catch (err) {
                document.getElementById('app').innerHTML = '<div class="loading">加载失败，请检查网络连接</div>';
                console.error(err);
            }
        }

        // ---------- 视图渲染 ----------

        function bindControls() {
            const cbMonth = document.getElementById('cbMonth');
            const cbDay = document.getElementById('cbDay');
            const cbRun = document.getElementById('cbRun');

            cbMonth.addEventListener('change', () => {
                collapseMonths = cbMonth.checked;
                // 级联控制逻辑：收起月份时，必然收起日期和记录
                if (collapseMonths) {
                    collapseDays = true;
                    collapseRuns = true;
                }
                renderApp();
            });

            cbDay.addEventListener('change', () => {
                collapseDays = cbDay.checked;
                // 级联控制逻辑：收起日期时，必然收起记录
                if (collapseDays) {
                    collapseRuns = true;
                }
                renderApp();
            });

            cbRun.addEventListener('change', () => {
                collapseRuns = cbRun.checked;
                renderApp();
            });
        }

        function renderApp() {
            const app = document.getElementById('app');
            
            let html = `
                <div class="summary-card">
                    <h1>运动总览</h1>
                    <p class="summary-stats">累计跑步 ${parsedData.total.count} 次 · 总里程 ${(parsedData.total.dist).toFixed(2)} km</p>
                </div>
                
                <div class="drill-controls">
                    <label class="${collapseMonths ? '' : ''}">
                        <input type="checkbox" id="cbMonth" ${collapseMonths ? 'checked' : ''}> 收起月份
                    </label>
                    <label class="${collapseMonths ? 'disabled' : ''}">
                        <input type="checkbox" id="cbDay" ${collapseDays ? 'checked' : ''} ${collapseMonths ? 'disabled' : ''}> 收起日期
                    </label>
                    <label class="${collapseMonths || collapseDays ? 'disabled' : ''}">
                        <input type="checkbox" id="cbRun" ${collapseRuns ? 'checked' : ''} ${collapseMonths || collapseDays ? 'disabled' : ''}> 收起单次记录
                    </label>
                </div>
                <div class="timeline">
            `;

            const years = Object.keys(parsedData.years).sort((a, b) => b - a);
            years.forEach(year => {
                const yData = parsedData.years[year];
                html += `
                    <div class="year-block">
                        <div class="year-title">
                            <span>${year}</span>
                            <span class="stats-inline">${yData.count} 次 · ${(yData.dist).toFixed(2)} km</span>
                        </div>
                `;

                if (!collapseMonths) {
                    html += `<div class="month-list">`;
                    const months = Object.keys(yData.months).sort((a, b) => b - a);
                    months.forEach(month => {
                        const mData = yData.months[month];
                        html += `
                            <div class="month-block">
                                <div class="month-title">
                                    <span>${padZero(month)} 月</span>
                                    <span class="stats-inline">${mData.count} 次 · ${(mData.dist).toFixed(2)} km</span>
                                </div>
                        `;

                        if (!collapseDays) {
                            html += `<div class="day-list">`;
                            const days = Object.keys(mData.days).sort((a, b) => b - a);
                            days.forEach(day => {
                                const dData = mData.days[day];
                                html += `
                                    <div class="day-block">
                                        <div class="day-title">
                                            <span>${padZero(month)} / ${padZero(day)}</span>
                                            <span class="stats-inline">${dData.count} 次 · ${(dData.dist).toFixed(2)} km</span>
                                        </div>
                                `;

                                if (!collapseRuns && dData.runs) {
                                    html += `<ul class="run-list">`;
                                    dData.runs.forEach(run => {
                                        const dist = (run.distance / 1000).toFixed(2);
                                        const timeStr = formatTime(run.moving_time);
                                        const paceStr = formatPace(run.average_speed);
                                        const hrStr = run.average_heartrate ? `${Math.round(run.average_heartrate)} bpm` : '-';
                                        
                                        const d = new Date(run.start_date_local.replace(' ', 'T'));
                                        const timeOnly = `${padZero(d.getHours())}:${padZero(d.getMinutes())}`;
                                        const city = run.city || '未知城市';

                                        html += `
                                            <li class="run-item">
                                                <div class="run-header">${timeOnly} · ${city}</div>
                                                <div class="run-stats-detail">${dist} km · ${timeStr} · ${paceStr}/km · 心率 ${hrStr}</div>
                                            </li>
                                        `;
                                    });
                                    html += `</ul>`;
                                }
                                html += `</div>`; // .day-block
                            });
                            html += `</div>`; // .day-list
                        }
                        html += `</div>`; // .month-block
                    });
                    html += `</div>`; // .month-list
                }
                html += `</div>`; // .year-block
            });

            html += `</div>`; // .timeline
            app.innerHTML = html;
            
            // 重新绑定事件
            bindControls();
        }

        // 启动
        init();
    </script>
</body>
</html>
