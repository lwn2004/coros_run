<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑步记录</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #222222;
            --text-secondary: #737373;
            --link-color: #111111;
            --link-hover: #2563eb;
            --line-color: #e5e5e5;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-primary: #e0e0e0;
                --text-secondary: #888888;
                --link-color: #ffffff;
                --link-hover: #8ab4f8;
                --line-color: #333333;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }
        h1, h2 {
            font-weight: 500;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 30px;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 15px;
        }
        a {
            color: var(--link-color);
            text-decoration: none;
            cursor: pointer;
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 1px;
            font-size: 1.1rem;
            transition: color 0.2s, border-bottom-color 0.2s;
        }
        a:hover {
            color: var(--link-hover);
            border-bottom-color: var(--link-hover);
        }
        .stats {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }
        /* 面包屑导航栏 */
        .breadcrumb {
            margin-bottom: 30px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .breadcrumb a {
            font-size: 0.95rem;
            border: none;
            color: var(--text-secondary);
        }
        .breadcrumb a:hover {
            color: var(--link-hover);
        }
        .breadcrumb span {
            margin: 0 6px;
            color: var(--line-color);
        }
        
        .loading {
            color: var(--text-secondary);
        }

        /* 复选框控件 (仅首页显示) */
        .drill-controls {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line-color);
            font-size: 0.95rem;
        }
        .drill-controls label {
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .drill-controls input[type="checkbox"] {
            accent-color: var(--link-hover);
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
        }
        .drill-controls input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 主页展开缩进 */
        .month-list, .day-list {
            margin-left: 24px;
            list-style: none;
        }
        .day-list {
            margin-left: 48px;
        }
        .month-item, .day-item {
            margin-bottom: 12px;
        }
        .month-item a, .day-item a {
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="loading">正在加载数据...</div>
    </div>

    <script>
        const API_URL = 'https://run.linwn.net/data/all.json';
        const BASE_PATH = '/text'; // 你的基础路由
        
        let parsedData = { total: { dist: 0, count: 0 }, years: {} };
        let expandMonth = false;
        let expandDay = false;

        // ---------- 路由控制器 ----------
        
        // 拦截全局带有 data-link 的 a 标签点击事件
        document.body.addEventListener('click', e => {
            if (e.target.matches('[data-link]')) {
                e.preventDefault();
                navigateTo(e.target.getAttribute('href'));
            }
        });

        // 监听浏览器前进/后退
        window.addEventListener('popstate', handleRoute);

        function navigateTo(url) {
            history.pushState(null, null, url);
            handleRoute();
        }

        // 核心路由解析
        function handleRoute() {
            const path = window.location.pathname;
            // 移除 BASE_PATH 获取相对路径
            let relativePath = path.startsWith(BASE_PATH) ? path.substring(BASE_PATH.length) : path;
            const parts = relativePath.split('/').filter(Boolean); // 例如: ['2025', '03', '02']

            if (parts.length === 0) renderHome();
            else if (parts.length === 1) renderYear(parts[0]);
            else if (parts.length === 2) renderMonth(parts[0], parseInt(parts[1], 10));
            else if (parts.length >= 3) renderDay(parts[0], parseInt(parts[1], 10), parseInt(parts[2], 10));
        }

        // ---------- 数据与工具 ----------

        function padZero(num) { return num.toString().padStart(2, '0'); }
        
        // 生成 URL 路径
        function getPath(year, month, day) {
            let path = BASE_PATH;
            if (year) path += `/${year}`;
            if (month) path += `/${padZero(month)}`;
            if (day) path += `/${padZero(day)}`;
            return path;
        }

        function formatTime(timeStr) {
            if (!timeStr) return '-';
            const parts = timeStr.split(':');
            return `${parseInt(parts[0]) > 0 ? parseInt(parts[0]) + '小时' : ''}${parseInt(parts[1])}分${parseInt(parts[2])}秒`;
        }
        
        function formatPace(speedMS) {
            if (!speedMS) return '-';
            const secPerKm = 1000 / speedMS;
            return `${Math.floor(secPerKm / 60)}'${Math.floor(secPerKm % 60).toString().padStart(2, '0')}"`;
        }
        
        function formatDate(dateStr) {
            const d = new Date(dateStr.replace(' ', 'T'));
            return `${d.getMonth() + 1}月${d.getDate()}日 ${padZero(d.getHours())}:${padZero(d.getMinutes())}`;
        }

        // 生成单条记录 HTML
        function generateRunItemHtml(run) {
            const dist = (run.distance / 1000).toFixed(2);
            return `
                <li>
                    <div><strong>${formatDate(run.start_date_local)} - ${run.city || '未知城市'}</strong></div>
                    <span class="stats">
                        距离: ${dist} km | 用时: ${formatTime(run.moving_time)} | 配速: ${formatPace(run.average_speed)} | 心率: ${run.average_heartrate ? Math.round(run.average_heartrate) + ' bpm' : '-'}
                    </span>
                </li>
            `;
        }

        // 面包屑生成器
        function generateBreadcrumb(year, month) {
            let html = `<div class="breadcrumb"><a href="${BASE_PATH}" data-link>首页</a>`;
            if (year) html += ` <span>/</span> <a href="${getPath(year)}" data-link>${year}年</a>`;
            if (month) html += ` <span>/</span> <a href="${getPath(year, month)}" data-link>${padZero(month)}月</a>`;
            html += `</div>`;
            return html;
        }

        // 初始化加载数据
        async function init() {
            try {
                const res = await fetch(API_URL);
                const rawData = await res.json();
                rawData.sort((a, b) => new Date(b.start_date_local.replace(' ', 'T')) - new Date(a.start_date_local.replace(' ', 'T')));

                rawData.forEach(run => {
                    const date = new Date(run.start_date_local.replace(' ', 'T'));
                    const year = date.getFullYear().toString();
                    const month = date.getMonth() + 1;
                    const day = date.getDate();
                    const distKm = run.distance / 1000;

                    parsedData.total.dist += distKm;
                    parsedData.total.count++;

                    if (!parsedData.years[year]) parsedData.years[year] = { dist: 0, count: 0, months: {} };
                    parsedData.years[year].dist += distKm;
                    parsedData.years[year].count++;

                    if (!parsedData.years[year].months[month]) parsedData.years[year].months[month] = { dist: 0, count: 0, runs: [], days: {} };
                    parsedData.years[year].months[month].dist += distKm;
                    parsedData.years[year].months[month].count++;
                    parsedData.years[year].months[month].runs.push(run);

                    if (!parsedData.years[year].months[month].days[day]) parsedData.years[year].months[month].days[day] = { dist: 0, count: 0, runs: [] };
                    parsedData.years[year].months[month].days[day].dist += distKm;
                    parsedData.years[year].months[month].days[day].count++;
                    parsedData.years[year].months[month].days[day].runs.push(run);
                });

                // 数据就绪，触发路由解析
                handleRoute();

            } catch (err) {
                document.getElementById('app').innerHTML = '<div class="loading">加载失败，请检查网络设置。</div>';
                console.error(err);
            }
        }

        // ---------- 页面渲染视图 ----------

        // 绑定首页复选框事件
        function bindHomeControls() {
            const cbMonth = document.getElementById('expandMonth');
            const cbDay = document.getElementById('expandDay');
            if(!cbMonth) return;

            cbMonth.addEventListener('change', () => {
                expandMonth = cbMonth.checked;
                if (!expandMonth) { cbDay.checked = false; cbDay.disabled = true; expandDay = false; } 
                else { cbDay.disabled = false; expandDay = cbDay.checked; }
                renderHome(); 
            });

            cbDay.addEventListener('change', () => {
                expandDay = cbDay.checked;
                renderHome();
            });
        }

        function renderHome() {
            const app = document.getElementById('app');
            // 生成复选框控件
            let html = `
                <div class="drill-controls">
                    <label><input type="checkbox" id="expandMonth" ${expandMonth ? 'checked' : ''}> 展开月份</label>
                    <label><input type="checkbox" id="expandDay" ${expandDay ? 'checked' : ''} ${!expandMonth ? 'disabled' : ''}> 展开日期</label>
                </div>
                <h1>生涯总计</h1>
                <p>共奔跑 ${parsedData.total.count} 次，累计 ${(parsedData.total.dist).toFixed(2)} 公里</p>
                <ul>
            `;

            const years = Object.keys(parsedData.years).sort((a, b) => b - a);
            years.forEach(year => {
                const yData = parsedData.years[year];
                html += `
                    <li>
                        <a href="${getPath(year)}" data-link>${year} 年</a>
                        <span class="stats">${yData.count} 次，${(yData.dist).toFixed(2)} 公里</span>
                `;

                if (expandMonth) {
                    html += `<ul class="month-list">`;
                    const months = Object.keys(yData.months).sort((a, b) => b - a);
                    months.forEach(month => {
                        const mData = yData.months[month];
                        html += `
                            <li class="month-item">
                                <a href="${getPath(year, month)}" data-link>${month} 月</a>
                                <span class="stats">${mData.count} 次，${(mData.dist).toFixed(2)} 公里</span>
                        `;

                        if (expandDay && mData.days) {
                            html += `<ul class="day-list">`;
                            const days = Object.keys(mData.days).sort((a, b) => b - a);
                            days.forEach(day => {
                                const dData = mData.days[day];
                                html += `
                                    <li class="day-item">
                                        <a href="${getPath(year, month, day)}" data-link>${month}月${day}日</a>
                                        <span class="stats">${dData.count} 次，${(dData.dist).toFixed(2)} 公里</span>
                                    </li>
                                `;
                            });
                            html += `</ul>`;
                        }
                        html += `</li>`; 
                    });
                    html += `</ul>`;
                }
                html += `</li>`; 
            });

            html += `</ul>`;
            app.innerHTML = html;
            bindHomeControls();
        }

        function renderYear(year) {
            const yData = parsedData.years[year];
            if (!yData) return handleRouteFallback();
            
            let html = generateBreadcrumb();
            html += `
                <h1>${year} 年</h1>
                <p>共奔跑 ${yData.count} 次，累计 ${(yData.dist).toFixed(2)} 公里</p>
                <ul>
            `;
            const months = Object.keys(yData.months).sort((a, b) => b - a);
            months.forEach(month => {
                const mData = yData.months[month];
                html += `
                    <li>
                        <a href="${getPath(year, month)}" data-link>${padZero(month)} 月</a>
                        <span class="stats">${mData.count} 次，${(mData.dist).toFixed(2)} 公里</span>
                    </li>
                `;
            });
            html += `</ul>`;
            document.getElementById('app').innerHTML = html;
        }

        function renderMonth(year, month) {
            const mData = parsedData.years[year]?.months[month];
            if (!mData) return handleRouteFallback();

            let html = generateBreadcrumb(year);
            html += `
                <h1>${year} 年 ${padZero(month)} 月</h1>
                <p>共奔跑 ${mData.count} 次，累计 ${(mData.dist).toFixed(2)} 公里</p>
                <ul>
            `;
            mData.runs.forEach(run => html += generateRunItemHtml(run));
            html += `</ul>`;
            document.getElementById('app').innerHTML = html;
        }

        function renderDay(year, month, day) {
            const dayData = parsedData.years[year]?.months[month]?.days[day];
            if (!dayData) return handleRouteFallback();

            let html = generateBreadcrumb(year, month);
            html += `
                <h1>${padZero(month)}月${padZero(day)}日</h1>
                <p>共奔跑 ${dayData.count} 次，累计 ${(dayData.dist).toFixed(2)} 公里</p>
                <ul>
            `;
            dayData.runs.forEach(run => html += generateRunItemHtml(run));
            html += `</ul>`;
            document.getElementById('app').innerHTML = html;
        }

        function handleRouteFallback() {
            document.getElementById('app').innerHTML = `
                ${generateBreadcrumb()}
                <h1>数据未找到</h1>
                <p>未找到该路径对应的跑步记录。</p>
            `;
        }

        // 启动应用
        init();
    </script>
</body>
</html>
