<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑步记录</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #222222;
            --text-secondary: #737373;
            --link-color: #111111;
            --link-hover: #2563eb;
            --line-color: #e5e5e5;
            --checkbox-bg: #f5f5f5;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-primary: #e0e0e0;
                --text-secondary: #888888;
                --link-color: #ffffff;
                --link-hover: #8ab4f8;
                --line-color: #333333;
                --checkbox-bg: #2a2a2a;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }
        h1, h2 {
            font-weight: 500;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 30px;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 10px;
        }
        
        .toggle-title {
            color: var(--link-color);
            cursor: pointer;
            border-bottom: 1px solid transparent;
            padding-bottom: 1px;
            font-size: 1.1rem;
            transition: color 0.2s, border-bottom-color 0.2s;
            display: inline-block;
            user-select: none;
        }
        .toggle-title:hover {
            color: var(--link-hover);
            border-bottom-color: var(--link-hover);
        }
        
        .loading {
            color: var(--text-secondary);
        }

        .month-list {
            margin-left: 24px;
            margin-top: 8px;
        }
        .day-list {
            margin-left: 24px;
            margin-top: 8px;
        }
        .month-item {
            margin-bottom: 12px;
        }
        
        .display-options {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 1.5rem;
            background: var(--checkbox-bg);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-size: 0.9rem;
            border: 1px solid var(--line-color);
        }
        .display-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--text-primary);
        }
        .display-options input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--link-hover);
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="loading">正在加载数据...</div>
    </div>

    <script>
        const API_URL = 'https://run.linwn.net/data/all.json';
        
        let parsedData = { total: { dist: 0, count: 0, totalSecs: 0, hrSum: 0, hrCount: 0 }, years: {} };
        
        // 展开状态
        let expandedYears = new Set();
        let expandedMonths = new Set();

        let displayOptions = {
            showCount: false,
            showDistance: true,
            showTotalTime: false,
            showAvgPace: true,
            showAvgHr: false
        };

        window.toggleDisplayOption = function(opt) {
            displayOptions[opt] = !displayOptions[opt];
            renderApp();
        };

        function padZero(num) { return num.toString().padStart(2, '0'); }
        
        function formatTime(timeStr) {
            if (!timeStr) return '-';
            const parts = timeStr.split(':');
            return `${parseInt(parts[0]) > 0 ? parseInt(parts[0]) + ':' : ''}${parseInt(parts[1])}:${parseInt(parts[2])}`;
        }

        function parseTimeToSeconds(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.split(':');
            const h = parseInt(parts[0]) || 0;
            const m = parseInt(parts[1]) || 0;
            const s = parseFloat(parts[2]) || 0;
            return (h * 3600) + (m * 60) + s;
        }

        function calcAvgPace(totalSecs, totalDistKm) {
            if (!totalDistKm || totalDistKm <= 0) return '-';
            const secPerKm = totalSecs / totalDistKm;
            return `${Math.floor(secPerKm / 60)}'${Math.floor(secPerKm % 60).toString().padStart(2, '0')}"`;
        }

        function calcAvgHr(hrSum, hrCount) {
            return hrCount > 0 ? Math.round(hrSum / hrCount) + ' bpm' : '-';
        }

        function formatTotalTime(seconds) {
            if (!seconds || seconds <= 0) return '0min';
            const totalSecsInt = Math.floor(seconds);
            const hours = Math.floor(totalSecsInt / 3600);
            const minutes = Math.floor((totalSecsInt % 3600) / 60);
            const secs = totalSecsInt % 60;
            if (hours > 0) {
                return `${hours}h${minutes}min`;
            } else if (minutes > 0) {
                return `${minutes}min`;
            } else {
                return `${secs}sec`;
            }
        }
        
        function formatPace(speedMS) {
            if (!speedMS) return '-';
            const secPerKm = 1000 / speedMS;
            return `${Math.floor(secPerKm / 60)}'${Math.floor(secPerKm % 60).toString().padStart(2, '0')}"`;
        }
        
        function formatTimeOnly(dateStr) {
            const d = new Date(dateStr.replace(' ', 'T'));
            return `${padZero(d.getHours())}:${padZero(d.getMinutes())}`;
        }
        function getRunTypeByTime(timeString) {
          let hour;
          if (/^\d{1,2}:\d{2}/.test(timeString)) {
            hour = parseInt(timeString.split(':')[0], 10);
          } else {
            const date = new Date(timeString);
            if (!isNaN(date.getTime())) {
              hour = date.getHours();
            } else {
              return "未知时间跑";
            }
          }

          if (hour >= 5 && hour < 9) {
            return "晨跑";      
          } else if (hour >= 9 && hour < 12) {
            return "上午跑";    
          } else if (hour >= 12 && hour < 14) {
            return "午跑";      
          } else if (hour >= 14 && hour < 18) {
            return "下午跑";    
          } else if (hour >= 18 && hour <= 23) {
            return "夜跑";      
          } else {
            return "凌晨跑";    
          }
        }
        
        async function init() {
            try {
                const res = await fetch(API_URL);
                const rawData = await res.json();
                
                rawData.sort((a, b) => new Date(b.start_date_local.replace(' ', 'T')) - new Date(a.start_date_local.replace(' ', 'T')));

                rawData.forEach(run => {
                    const date = new Date(run.start_date_local.replace(' ', 'T'));
                    const year = date.getFullYear().toString();
                    const month = date.getMonth() + 1;
                    const day = date.getDate();
                    const distKm = run.distance / 1000;
                    
                    const timeSecs = parseTimeToSeconds(run.moving_time);
                    const hr = run.average_heartrate ? parseFloat(run.average_heartrate) : 0;

                    parsedData.total.dist += distKm;
                    parsedData.total.count++;
                    parsedData.total.totalSecs += timeSecs;
                    if (hr > 0) {
                        parsedData.total.hrSum += hr;
                        parsedData.total.hrCount++;
                    }

                    if (!parsedData.years[year]) parsedData.years[year] = { dist: 0, count: 0, totalSecs: 0, hrSum: 0, hrCount: 0, months: {} };
                    parsedData.years[year].dist += distKm;
                    parsedData.years[year].count++;
                    parsedData.years[year].totalSecs += timeSecs;
                    if (hr > 0) {
                        parsedData.years[year].hrSum += hr;
                        parsedData.years[year].hrCount++;
                    }

                    if (!parsedData.years[year].months[month]) parsedData.years[year].months[month] = { dist: 0, count: 0, totalSecs: 0, hrSum: 0, hrCount: 0, days: {} };
                    parsedData.years[year].months[month].dist += distKm;
                    parsedData.years[year].months[month].count++;
                    parsedData.years[year].months[month].totalSecs += timeSecs;
                    if (hr > 0) {
                        parsedData.years[year].months[month].hrSum += hr;
                        parsedData.years[year].months[month].hrCount++;
                    }

                    if (!parsedData.years[year].months[month].days[day]) parsedData.years[year].months[month].days[day] = { dist: 0, count: 0, runs: [] };
                    parsedData.years[year].months[month].days[day].dist += distKm;
                    parsedData.years[year].months[month].days[day].count++;
                    parsedData.years[year].months[month].days[day].runs.push(run);
                });

                const years = Object.keys(parsedData.years).sort((a, b) => b - a);
                if (years.length > 0) {
                    const latestYear = years[0];
                    expandedYears.add(latestYear);
                    const months = Object.keys(parsedData.years[latestYear].months).sort((a, b) => b - a);
                    if (months.length > 0) {
                        expandedMonths.add(`${latestYear}-${months[0]}`);
                    }
                }

                renderApp();

            } catch (err) {
                document.getElementById('app').innerHTML = '<div class="loading">加载失败，请检查网络设置。</div>';
                console.error(err);
            }
        }

        window.toggleYear = function(year) {
            if (expandedYears.has(year)) {
                expandedYears.delete(year);
            } else {
                expandedYears.add(year);
            }
            renderApp();
        };

        window.toggleMonth = function(year, month) {
            const key = `${year}-${month}`;
            if (expandedMonths.has(key)) {
                expandedMonths.delete(key);
            } else {
                expandedMonths.add(key);
            }
            renderApp();
        };

        function renderApp() {
            const app = document.getElementById('app');
            
            const totalPace = calcAvgPace(parsedData.total.totalSecs, parsedData.total.dist);
            const totalHr = calcAvgHr(parsedData.total.hrSum, parsedData.total.hrCount);

            let optionsHtml = `
                <div class="display-options">
                    <label><input type="checkbox" ${displayOptions.showCount ? 'checked' : ''} onchange="toggleDisplayOption('showCount')"> 总次数</label>
                    <label><input type="checkbox" ${displayOptions.showDistance ? 'checked' : ''} onchange="toggleDisplayOption('showDistance')"> 总里程</label>
                    <label><input type="checkbox" ${displayOptions.showTotalTime ? 'checked' : ''} onchange="toggleDisplayOption('showTotalTime')"> 总用时</label>
                    <label><input type="checkbox" ${displayOptions.showAvgPace ? 'checked' : ''} onchange="toggleDisplayOption('showAvgPace')"> 平均配速</label>
                    <label><input type="checkbox" ${displayOptions.showAvgHr ? 'checked' : ''} onchange="toggleDisplayOption('showAvgHr')"> 平均心率</label>
                </div>
            `;

            let totalParts1 = [];
            if (displayOptions.showCount) totalParts1.push(`共奔跑 ${parsedData.total.count} 次`);
            if (displayOptions.showDistance) totalParts1.push(`累计 ${parsedData.total.dist.toFixed(2)} km`);
            if (displayOptions.showTotalTime) totalParts1.push(`总用时 ${formatTotalTime(parsedData.total.totalSecs)}`);

            let totalParts2 = [];
            if (displayOptions.showAvgPace) totalParts2.push(`平均配速: ${totalPace}`);
            if (displayOptions.showAvgHr) totalParts2.push(`平均心率: ${totalHr}`);

            let totalHtml = `<h1>生涯总计</h1><p>`;
            if (totalParts1.length > 0) totalHtml += totalParts1.join('，');
            if (totalParts1.length > 0 && totalParts2.length > 0) totalHtml += '<br>';
            if (totalParts2.length > 0) totalHtml += totalParts2.join(' | ');
            if (totalParts1.length === 0 && totalParts2.length === 0) totalHtml += '暂无统计数据';
            totalHtml += `</p>`;

            let html = optionsHtml + totalHtml + `<ul>`;

            const years = Object.keys(parsedData.years).sort((a, b) => b - a);
            
            years.forEach(year => {
                const yData = parsedData.years[year];
                const isYearExpanded = expandedYears.has(year);
                
                const yPace = calcAvgPace(yData.totalSecs, yData.dist);
                const yHr = calcAvgHr(yData.hrSum, yData.hrCount);
                
                // 根据用户的复选框动态拼装年份数据
                let yearStatsParts = [];
                if (displayOptions.showDistance) yearStatsParts.push(`${yData.dist.toFixed(2)} km`);
                if (displayOptions.showAvgPace) yearStatsParts.push(`${yPace}`);
                if (displayOptions.showCount) yearStatsParts.push(`${yData.count} 次`);
                if (displayOptions.showTotalTime) yearStatsParts.push(`${formatTotalTime(yData.totalSecs)}`);
                if (displayOptions.showAvgHr) yearStatsParts.push(`${yHr}`);
                const yearStatsStr = yearStatsParts.join('，') || '—';

                html += `
                    <li>
                        <div class="toggle-title" onclick="toggleYear('${year}')">
                            ${year}年 ${yearStatsStr}
                        </div>
                `;

                if (isYearExpanded) {
                    html += `<ul class="month-list">`;
                    const months = Object.keys(yData.months).sort((a, b) => b - a);
                    
                    months.forEach(month => {
                        const mData = yData.months[month];
                        const monthKey = `${year}-${month}`;
                        const isMonthExpanded = expandedMonths.has(monthKey);

                        const mPace = calcAvgPace(mData.totalSecs, mData.dist);
                        const mHr = calcAvgHr(mData.hrSum, mData.hrCount);

                        // 拼装月份数据
                        let monthStatsParts = [];
                        if (displayOptions.showDistance) monthStatsParts.push(`${mData.dist.toFixed(2)} km`);
                        if (displayOptions.showAvgPace) monthStatsParts.push(`${mPace}`);
                        if (displayOptions.showCount) monthStatsParts.push(`${mData.count} 次`);
                        if (displayOptions.showTotalTime) monthStatsParts.push(`${formatTotalTime(mData.totalSecs)}`);
                        if (displayOptions.showAvgHr) monthStatsParts.push(`${mHr}`);
                        const monthStatsStr = monthStatsParts.join('，') || '—';

                        html += `
                            <li class="month-item">
                                <div class="toggle-title" style="font-size: 1rem;" onclick="toggleMonth('${year}', '${month}')">
                                    ${month}月 ${monthStatsStr}
                                </div>
                        `;

                        if (isMonthExpanded && mData.days) {
                            html += `<ul class="day-list">`;
                            const days = Object.keys(mData.days).sort((a, b) => b - a);
                            
                            days.forEach(day => {
                                const dData = mData.days[day];
                                
                                dData.runs.forEach((run, index) => {
                                    const dist = (run.distance / 1000).toFixed(2);
                                    
                                    // 拼装具体单次跑步的数据（公里，配速等）
                                    let runStatsParts = [];
                                    if (displayOptions.showDistance) runStatsParts.push(`${dist} km`);
                                    if (displayOptions.showAvgPace) runStatsParts.push(`${formatPace(run.average_speed)}`);
                                    if (displayOptions.showTotalTime) runStatsParts.push(`${formatTime(run.moving_time)}`);
                                    if (displayOptions.showAvgHr) runStatsParts.push(`${run.average_heartrate ? Math.round(run.average_heartrate) + ' bpm' : '-'}`);
                                    
                                    const cityInfo = `${run.city || '未知城市'} ${formatTimeOnly(run.start_date_local)} ${getRunTypeByTime(formatTimeOnly(run.start_date_local))}`;
                                    
                                    // 格式化为： 23.10 km, 5'40"，广州市 06:29 晨跑
                                    const runStatsStr = runStatsParts.join(', ') + '，' + cityInfo;
                                    
                                    // 同一日期的第二条数据隐藏日期标签，实现整齐的留白对齐
                                    let dateText = `${day}日,`;
                                    let dateHtml = index === 0 ? dateText : `<span style="visibility: hidden;">${dateText}</span>`;

                                    html += `
                                        <li style="margin-bottom: 6px; font-size: 0.95rem; color: var(--text-secondary); display: flex;">
                                            <span style="margin-right: 0.5rem; white-space: pre;">${dateHtml}</span>
                                            <span>${runStatsStr}</span>
                                        </li>
                                    `;
                                });
                            });
                            html += `</ul>`;
                        }
                        html += `</li>`; 
                    });
                    html += `</ul>`;
                }
                html += `</li>`; 
            });

            html += `</ul>`;
            app.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
