<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑步记录 · 主页展开月/日</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #222222;
            --text-secondary: #737373;
            --link-color: #111111;
            --link-hover: #2563eb;
            --line-color: #e5e5e5;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-primary: #e0e0e0;
                --text-secondary: #888888;
                --link-color: #ffffff;
                --link-hover: #8ab4f8;
                --line-color: #333333;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }
        h1, h2 {
            font-weight: 500;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 30px;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 15px;
        }
        a {
            color: var(--link-color);
            text-decoration: none;
            cursor: pointer;
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 1px;
            font-size: 1.1rem;
            transition: color 0.2s, border-bottom-color 0.2s;
        }
        a:hover {
            color: var(--link-hover);
            border-bottom-color: var(--link-hover);
        }
        .stats {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .nav-back {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--text-secondary);
            border: none;
            font-size: 0.9rem;
        }
        .nav-back::before {
            content: "← ";
        }
        .nav-back:hover {
            color: var(--link-hover);
            border: none;
        }
        .loading {
            color: var(--text-secondary);
        }

        /* 复选框控件 */
        .drill-controls {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line-color);
            font-size: 0.95rem;
        }
        .drill-controls label {
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .drill-controls input[type="checkbox"] {
            accent-color: var(--link-hover);
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
        }
        .drill-controls input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 主页展开缩进 */
        .month-list, .day-list {
            margin-left: 24px;
            list-style: none;
        }
        .day-list {
            margin-left: 48px;
        }
        .month-item, .day-item {
            margin-bottom: 12px;
        }
        .month-item a, .day-item a {
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- 两个复选框：展开月份 / 展开日期（日期受月份控制） -->
    <div class="drill-controls">
        <label>
            <input type="checkbox" id="expandMonth"> 展开月份
        </label>
        <label>
            <input type="checkbox" id="expandDay" disabled> 展开日期
        </label>
    </div>

    <div id="app">
        <div class="loading">正在加载数据...</div>
    </div>

    <script>
        const API_URL = 'https://run.linwn.net/data/all.json';
        let rawData = [];
        let parsedData = { total: { dist: 0, count: 0 }, years: {} };

        // 复选框状态 & 当前路由
        let expandMonth = false;
        let expandDay = false;
        let currentRoute = { type: 'home' };

        // ---------- 辅助函数 (与原逻辑一致) ----------
        function formatTime(timeStr) {
            if (!timeStr) return '-';
            const parts = timeStr.split(':');
            return `${parseInt(parts[0]) > 0 ? parseInt(parts[0]) + '小时' : ''}${parseInt(parts[1])}分${parseInt(parts[2])}秒`;
        }
        function formatPace(speedMS) {
            if (!speedMS) return '-';
            const secPerKm = 1000 / speedMS;
            const m = Math.floor(secPerKm / 60);
            const s = Math.floor(secPerKm % 60);
            return `${m}'${s.toString().padStart(2, '0')}"`;
        }
        function formatDate(dateStr) {
            const d = new Date(dateStr.replace(' ', 'T'));
            return `${d.getMonth() + 1}月${d.getDate()}日 ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }
        function formatShortDate(dateStr) {
            const d = new Date(dateStr.replace(' ', 'T'));
            return `${d.getMonth() + 1}月${d.getDate()}日`;
        }

        // 生成单条跑步记录HTML
        function generateRunItemHtml(run) {
            const dist = (run.distance / 1000).toFixed(2);
            return `
                <li>
                    <div><strong>${formatDate(run.start_date_local)} - ${run.city || '未知城市'}</strong></div>
                    <span class="stats">
                        距离: ${dist} km | 
                        用时: ${formatTime(run.moving_time)} | 
                        配速: ${formatPace(run.average_speed)} | 
                        心率: ${run.average_heartrate ? Math.round(run.average_heartrate) + ' bpm' : '-'}
                    </span>
                </li>
            `;
        }

        // ---------- 数据解析 (增加日汇总) ----------
        async function init() {
            try {
                const res = await fetch(API_URL);
                rawData = await res.json();
                rawData.sort((a, b) => new Date(b.start_date_local.replace(' ', 'T')) - new Date(a.start_date_local.replace(' ', 'T')));

                rawData.forEach(run => {
                    const date = new Date(run.start_date_local.replace(' ', 'T'));
                    const year = date.getFullYear();
                    const month = date.getMonth() + 1;
                    const day = date.getDate();
                    const distKm = run.distance / 1000;

                    // 总计
                    parsedData.total.dist += distKm;
                    parsedData.total.count++;

                    // 年份
                    if (!parsedData.years[year]) {
                        parsedData.years[year] = { dist: 0, count: 0, months: {} };
                    }
                    parsedData.years[year].dist += distKm;
                    parsedData.years[year].count++;

                    // 月份
                    if (!parsedData.years[year].months[month]) {
                        parsedData.years[year].months[month] = { dist: 0, count: 0, runs: [], days: {} };
                    }
                    parsedData.years[year].months[month].dist += distKm;
                    parsedData.years[year].months[month].count++;
                    parsedData.years[year].months[month].runs.push(run);

                    // 日 (新增)
                    if (!parsedData.years[year].months[month].days[day]) {
                        parsedData.years[year].months[month].days[day] = { dist: 0, count: 0, runs: [] };
                    }
                    parsedData.years[year].months[month].days[day].dist += distKm;
                    parsedData.years[year].months[month].days[day].count++;
                    parsedData.years[year].months[month].days[day].runs.push(run);
                });

                // 复选框联动
                const cbMonth = document.getElementById('expandMonth');
                const cbDay = document.getElementById('expandDay');

                function updateCheckboxes() {
                    expandMonth = cbMonth.checked;
                    if (!expandMonth) {
                        cbDay.checked = false;
                        cbDay.disabled = true;
                        expandDay = false;
                    } else {
                        cbDay.disabled = false;
                        expandDay = cbDay.checked;
                    }
                }

                // 初始化状态
                updateCheckboxes();

                cbMonth.addEventListener('change', () => {
                    updateCheckboxes();
                    renderHome(); // 切换复选框即回到主页并应用新状态
                });

                cbDay.addEventListener('change', () => {
                    expandDay = cbDay.checked;
                    renderHome();
                });

                // 渲染主页
                renderHome();
            } catch (err) {
                document.getElementById('app').innerHTML = '<div class="loading">加载失败，请检查网络或跨域设置。</div>';
                console.error(err);
            }
        }

        // ---------- 重新渲染当前路由 (被复选框变化调用) ----------
        function reRenderCurrentRoute() {
            if (currentRoute.type === 'home') renderHome();
            else if (currentRoute.type === 'year') renderYear(currentRoute.year);
            else if (currentRoute.type === 'month') renderMonth(currentRoute.year, currentRoute.month);
            else if (currentRoute.type === 'day') renderDay(currentRoute.year, currentRoute.month, currentRoute.day);
        }

        // ---------- 主页渲染 (根据复选框动态展开) ----------
        function renderHome() {
            currentRoute = { type: 'home' };
            const app = document.getElementById('app');
            let html = `
                <h1>生涯总计</h1>
                <p>共奔跑 ${parsedData.total.count} 次，累计 ${(parsedData.total.dist).toFixed(2)} 公里</p>
                <ul>
            `;

            const years = Object.keys(parsedData.years).sort((a, b) => b - a);
            years.forEach(year => {
                const yData = parsedData.years[year];
                // 年份条目
                html += `
                    <li>
                        <a onclick="renderYear(${year})">${year} 年</a>
                        <span class="stats">${yData.count} 次，${(yData.dist).toFixed(2)} 公里</span>
                `;

                // 如果展开月份，添加月份列表
                if (expandMonth) {
                    html += `<ul class="month-list">`;
                    const months = Object.keys(yData.months).sort((a, b) => b - a); // 降序
                    months.forEach(month => {
                        const mData = yData.months[month];
                        html += `
                            <li class="month-item">
                                <a onclick="renderMonth(${year}, ${month})">${month} 月</a>
                                <span class="stats">${mData.count} 次，${(mData.dist).toFixed(2)} 公里</span>
                        `;

                        // 如果展开日期，添加日列表
                        if (expandDay && mData.days) {
                            html += `<ul class="day-list">`;
                            const days = Object.keys(mData.days).sort((a, b) => b - a); // 降序
                            days.forEach(day => {
                                const dData = mData.days[day];
                                // 找一个样本获取短日期描述
                                const sampleRun = dData.runs[0];
                                const dayLabel = sampleRun ? formatShortDate(sampleRun.start_date_local) : `${day}日`;
                                html += `
                                    <li class="day-item">
                                        <a onclick="renderDay(${year}, ${month}, ${day})">${dayLabel}</a>
                                        <span class="stats">${dData.count} 次，${(dData.dist).toFixed(2)} 公里</span>
                                    </li>
                                `;
                            });
                            html += `</ul>`;
                        }

                        html += `</li>`; // 闭合 month-item
                    });
                    html += `</ul>`;
                }

                html += `</li>`; // 闭合年份li
            });

            html += `</ul>`;
            app.innerHTML = html;
        }

        // ---------- 年份页 (保持原样：仅显示月份列表) ----------
        function renderYear(year) {
            currentRoute = { type: 'year', year: year };
            const app = document.getElementById('app');
            const yData = parsedData.years[year];
            let html = `
                <a class="nav-back" onclick="renderHome()">返回总计</a>
                <h1>${year} 年</h1>
                <p>共奔跑 ${yData.count} 次，累计 ${(yData.dist).toFixed(2)} 公里</p>
                <ul>
            `;
            const months = Object.keys(yData.months).sort((a, b) => b - a);
            months.forEach(month => {
                const mData = yData.months[month];
                html += `
                    <li>
                        <a onclick="renderMonth(${year}, ${month})">${month} 月</a>
                        <span class="stats">${mData.count} 次，${(mData.dist).toFixed(2)} 公里</span>
                    </li>
                `;
            });
            html += `</ul>`;
            app.innerHTML = html;
        }

        // ---------- 月份页 (保持原样：显示该月所有跑步记录) ----------
        function renderMonth(year, month) {
            currentRoute = { type: 'month', year: year, month: month };
            const app = document.getElementById('app');
            const mData = parsedData.years[year].months[month];
            let html = `
                <a class="nav-back" onclick="renderYear(${year})">返回 ${year} 年</a>
                <h1>${year} 年 ${month} 月</h1>
                <p>共奔跑 ${mData.count} 次，累计 ${(mData.dist).toFixed(2)} 公里</p>
                <ul>
            `;
            mData.runs.forEach(run => {
                html += generateRunItemHtml(run);
            });
            html += `</ul>`;
            app.innerHTML = html;
        }

        // ---------- 新增：日详情页 ----------
        function renderDay(year, month, day) {
            currentRoute = { type: 'day', year: year, month: month, day: day };
            const app = document.getElementById('app');
            const dayData = parsedData.years[year].months[month].days[day];
            if (!dayData) {
                app.innerHTML = `<a class="nav-back" onclick="renderMonth(${year}, ${month})">返回 ${year} 年 ${month} 月</a><p>没有找到该日数据</p>`;
                return;
            }
            // 构造一个友好的日期标题
            const sampleRun = dayData.runs[0];
            const dayTitle = sampleRun ? formatShortDate(sampleRun.start_date_local) : `${year}年${month}月${day}日`;
            let html = `
                <a class="nav-back" onclick="renderMonth(${year}, ${month})">返回 ${year} 年 ${month} 月</a>
                <h1>${dayTitle}</h1>
                <p>共奔跑 ${dayData.count} 次，累计 ${(dayData.dist).toFixed(2)} 公里</p>
                <ul>
            `;
            // 该日跑步记录按时间倒序（已整体排序，可直接使用）
            dayData.runs.forEach(run => {
                html += generateRunItemHtml(run);
            });
            html += `</ul>`;
            app.innerHTML = html;
        }

        // 启动
        init();

        // 暴露全局函数供onclick调用
        window.renderHome = renderHome;
        window.renderYear = renderYear;
        window.renderMonth = renderMonth;
        window.renderDay = renderDay;
    </script>
</body>
</html>
