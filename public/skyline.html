<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>跑出天际线</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --text-main: #1f2328;
    --text-sub: #656d76;
    --baseline: #e1e4e8;
    
    /* 山脉/天际线颜色 - 翡翠绿渐变 */
    --skyline-bottom: #30a14e;
    --skyline-top: #216e39;
    --skyline-hover: #40c463;
    --window-color: #fffae0;
    --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  body {
    margin: 0;
    padding: 30px 15px;
    background-color: var(--bg);
    color: var(--text-main);
    font-family: var(--font-main);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* --- 头部样式 --- */
  header {
    position: relative;
    width: 100%;
    max-width: 1200px;
    margin-bottom: 20px;
  }

  .header-container {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #f0f0f0;
  }
  .title-group {
    flex-shrink: 0;
  }
  .title-group h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0 0 6px 0;
    letter-spacing: 1.5px;
    color: #333;
  }

  .title-group p {
    margin: 0;
    font-size: 13px;
    color: #888;
    font-weight: 500;
  }

  .skyline-svg {
    height: 50px;
    flex-grow: 1;
  }

  /* --- 加载状态 --- */
  #loader {
    width: 100%;
    max-width: 1200px;
    text-align: center;
    padding: 40px 0;
    color: var(--text-sub);
    font-size: 14px;
    letter-spacing: 1px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  
  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid rgba(48, 161, 78, 0.2);
    border-top-color: var(--skyline-bottom);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- 容器与年度卡片 --- */
  .app {
    width: 100%;
    max-width: 1200px;
  }

  .year-block {
    background: var(--card);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    box-sizing: border-box;
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .year-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #eaeaea;
  }

  .year-title {
    font-size: 20px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .year-stats-wrap {
    flex: 1;
    margin-left: 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .year-stats-wrap::-webkit-scrollbar { display: none; }

  .year-stats {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    font-size: 12px;
    color: var(--text-sub);
    white-space: nowrap;
  }

  .stat-item {
    background: #f6f8fa;
    padding: 4px 8px;
    border-radius: 6px;
  }

  .stat-item strong {
    color: var(--text-main);
    font-size: 14px;
    margin: 0 2px;
  }

  /* --- 天际线图表 & Zoom Pan 视口 --- */
  .chart-viewport {
    width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    touch-action: pan-x pan-y; 
  }
  .chart-viewport::-webkit-scrollbar { display: none; }

  /* 核心修复区：增加 min-width 和 padding */
  .chart-inner {
    /* 强制最小宽度，确保 365天 + 1px gap 能够完美展示，不挤在一起 */
    min-width: 800px; 
    /* 左右增加 20px 缓冲，防止首尾月份文字被 overflow 裁剪 */
    padding: 0 20px; 
    box-sizing: border-box;
    transform-origin: left top; 
  }

  .skyline-container {
    position: relative;
    width: 100%;
    height: 140px;
    display: flex;
    align-items: flex-end;
    border-bottom: 1px solid var(--baseline);
    gap: 1px; /* 强制保留间隙 */
  }

  .skyline-bar {
    flex: 1;
    background: linear-gradient(to top, var(--skyline-bottom), var(--skyline-top));
    border-radius: 2px 2px 0 0;
    transition: background 0.2s;
  }

  .skyline-bar.zero {
    background: transparent;
  }

  .skyline-bar:hover {
    background: var(--skyline-hover);
  }

  .month-labels {
    position: relative;
    width: 100%;
    height: 25px;
    margin-top: 8px;
  }

  .month-label {
    position: absolute;
    top: 0;
    font-size: 11px;
    color: var(--text-sub);
    transform: translateX(-50%);
    font-weight: 600;
  }

  /* --- Tooltip --- */
  #tooltip {
    position: fixed;
    background: rgba(13, 17, 23, 0.9);
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    z-index: 9999;
    transition: opacity 0.1s;
    backdrop-filter: blur(4px);
    transform: translate(-50%, -100%);
    margin-top: -10px;
  }

  #tooltip strong {
    display: block;
    font-size: 10px;
    color: #8b949e;
    margin-bottom: 2px;
  }

  .tooltip-val { font-size: 15px; font-weight: 800; color: #58a6ff; }
  .tooltip-val span { font-size: 11px; color: #fff; }

  /* 响应式适配头部 */
  @media (max-width: 768px) {
    .year-header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .year-stats-wrap { margin-left: 0; width: 100%; }
    .year-stats { justify-content: flex-start; }
  }
</style>
</head>
<body>

  <header>
    <div class="header-container">
      <div class="title-group">
        <h1>跑出天际线</h1>
        <p>用脚步勾勒城市轮廓</p>
      </div>
<svg class="skyline-svg" preserveAspectRatio="xMinYMin meet">
      <rect x="0" y="20" width="15" height="40" fill="#c4c4e0" />
      <rect x="18" y="10" width="12" height="50" fill="#b8b8d0" />
      <rect x="35" y="30" width="18" height="30" fill="#d2d2e8" />
      <g>
        <rect x="58" y="5" width="20" height="55" fill="#a8a8c0" />
        <rect x="62" y="10" width="4" height="4" fill="var(--window-color)" />
        <rect x="70" y="10" width="4" height="4" fill="var(--window-color)" />
        <rect x="62" y="20" width="4" height="4" fill="var(--window-color)" />
      </g>
      <rect x="82" y="25" width="15" height="35" fill="#b8b8d0" />
      <rect x="100" y="15" width="12" height="45" fill="#c4c4e0" />
      <rect x="115" y="35" width="25" height="25" fill="#d2d2e8" />
      <rect x="145" y="8" width="10" height="52" fill="#a8a8c0" />
      <rect x="160" y="22" width="18" height="38" fill="#b8b8d0" />
      <rect x="185" y="30" width="12" height="30" fill="#c4c4e0" />
      <rect x="202" y="12" width="15" height="48" fill="#a8a8c0" />
    </svg>    </div>
  </header>

  <div id="loader">
    <div class="spinner"></div>
    <span>正在同步数据...</span>
  </div>

  <div id="app" class="app"></div>
  <div id="tooltip"></div>

<script>
  const DATA_URL = 'https://run.linwn.net/data/all.json';

  const isLeapYear = (year) => (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;

  function generateFullYearDates(year) {
    const dates = [];
    const days = isLeapYear(year) ? 366 : 365;
    const d = new Date(year, 0, 1);
    for (let i = 0; i < days; i++) {
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      dates.push(`${yyyy}-${mm}-${dd}`);
      d.setDate(d.getDate() + 1);
    }
    return dates;
  }

  function parseTime(timeStr) {
    if (!timeStr) return 0;
    const parts = timeStr.toString().split(':');
    let sec = 0;
    if (parts.length === 3) {
      sec = parseInt(parts[0], 10) * 3600 + parseInt(parts[1], 10) * 60 + parseFloat(parts[2]);
    } else if (parts.length === 2) {
      sec = parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
    }
    return sec;
  }

  function formatPace(secPerKm) {
    if (!secPerKm || secPerKm === Infinity || secPerKm <= 0) return "-'-''";
    const m = Math.floor(secPerKm / 60);
    const s = Math.floor(secPerKm % 60);
    return `${m}'${s.toString().padStart(2, '0')}''`;
  }

  // 手势缩放逻辑
  function attachZoomGestures(viewport, inner) {
    let currentScale = 1;
    let startDist = 0;
    let startScale = 1;

    viewport.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        startDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        startScale = currentScale;
      }
    }, { passive: false });

    viewport.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault(); 
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        currentScale = Math.max(1, Math.min(8, startScale * (dist / startDist)));
        inner.style.width = `${currentScale * 100}%`;
      }
    }, { passive: false });
  }

  // 纯粹的数学计算层 (速度极快)
  function processRunData(runs) {
    const yearData = {};
    let globalMaxDaily = 0;

    runs.forEach(run => {
      const dateStr = (run.start_date_local || run.start_date).split(' ')[0];
      const year = dateStr.slice(0, 4);
      const km = Number(run.distance || 0) / 1000;
      const timeSec = parseTime(run.moving_time);

      if (!yearData[year]) {
        yearData[year] = { 
          dates: {}, totalDistance: 0, totalTime: 0, 
          maxDaily: 0, minPace: Infinity, halfCount: 0, fullCount: 0
        };
      }

      const yd = yearData[year];
      yd.dates[dateStr] = (yd.dates[dateStr] || 0) + km;
      yd.totalDistance += km;
      yd.totalTime += timeSec;

      if (km >= 1 && timeSec > 0) {
        const runPace = timeSec / km;
        yd.minPace = Math.min(yd.minPace, runPace);
      }

      if (km >= 42.195) yd.fullCount++;
      else if (km >= 21.0975) yd.halfCount++;
    });

    const sortedYears = Object.keys(yearData).sort().reverse();
    sortedYears.forEach(year => {
      const yd = yearData[year];
      const allDates = generateFullYearDates(year);
      let maxDist = 0;
      
      allDates.forEach(date => {
        if (!yd.dates[date]) yd.dates[date] = 0;
        else maxDist = Math.max(maxDist, yd.dates[date]);
      });
      
      yd.maxDaily = maxDist;
      globalMaxDaily = Math.max(globalMaxDaily, maxDist);
    });

    return { yearData, sortedYears, globalMaxDaily };
  }

  // 渲染单个年份的 DOM (剥离出来以便异步调用)
  function renderYearBlock(year, yd, globalMaxDaily, container, tooltip) {
    if (yd.totalDistance === 0) return;

    const block = document.createElement('div');
    block.className = 'year-block';

    const avgPaceStr = yd.totalDistance > 0 ? formatPace(yd.totalTime / yd.totalDistance) : "-'-''";
    const minPaceStr = yd.minPace !== Infinity ? formatPace(yd.minPace) : "-'-''";

    const headerHtml = `
      <div class="year-header">
        <div class="year-title">${year}</div>
        <div class="year-stats-wrap">
          <div class="year-stats">
            <span class="stat-item">全年累计 <strong>${yd.totalDistance.toFixed(1)}</strong> km</span>
            <span class="stat-item">单日最高 <strong>${yd.maxDaily.toFixed(1)}</strong> km</span>
            <span class="stat-item">平均配速 <strong>${avgPaceStr}</strong></span>
            <span class="stat-item">最快配速 <strong>${minPaceStr}</strong></span>
            <span class="stat-item">半马 <strong>${yd.halfCount}</strong></span>
            <span class="stat-item">全马 <strong>${yd.fullCount}</strong></span>
          </div>
        </div>
      </div>
    `;
    block.innerHTML = headerHtml;

    const chartViewport = document.createElement('div');
    chartViewport.className = 'chart-viewport';
    
    const chartInner = document.createElement('div');
    chartInner.className = 'chart-inner';

    attachZoomGestures(chartViewport, chartInner);

    const skylineContainer = document.createElement('div');
    skylineContainer.className = 'skyline-container';

    // 渲染柱子
    const dates = Object.keys(yd.dates).sort();
    
    // 提升性能：使用 DocumentFragment 批量挂载节点
    const frag = document.createDocumentFragment();
    
    dates.forEach(date => {
      const km = yd.dates[date];
      const bar = document.createElement('div');
      
      if (km === 0) {
        bar.className = 'skyline-bar zero';
      } else {
        bar.className = 'skyline-bar';
        const heightPct = Math.max((km / globalMaxDaily) * 100, 2); 
        bar.style.height = `${heightPct}%`;
      }

      // Tooltip 事件交由鼠标和触摸处理
      const showTooltip = (e) => {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        tooltip.innerHTML = `<strong>${date}</strong><div class="tooltip-val">${km > 0 ? km.toFixed(2) : '0.00'} <span>km</span></div>`;
        tooltip.style.opacity = 1;
        tooltip.style.left = `${clientX}px`;
        tooltip.style.top = `${clientY}px`;
      };

      bar.addEventListener('mouseenter', showTooltip);
      bar.addEventListener('touchstart', showTooltip, {passive: true});
      bar.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });
      bar.addEventListener('touchend', () => { tooltip.style.opacity = 0; });

      frag.appendChild(bar);
    });

    skylineContainer.appendChild(frag);

    const monthLabels = document.createElement('div');
    monthLabels.className = 'month-labels';
    
    const daysInYear = isLeapYear(year) ? 366 : 365;
    const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
    let dayCount = 0;
    
    for (let m = 0; m < 12; m++) {
      const pct = (dayCount / daysInYear) * 100;
      const label = document.createElement('div');
      label.className = 'month-label';
      label.style.left = `${pct}%`;
      label.innerText = monthNames[m];
      monthLabels.appendChild(label);
      
      dayCount += new Date(year, m + 1, 0).getDate();
    }

    chartInner.appendChild(skylineContainer);
    chartInner.appendChild(monthLabels);
    chartViewport.appendChild(chartInner);
    block.appendChild(chartViewport);
    
    container.appendChild(block);
  }

  // 渐进式渲染机制 (Time Slicing)，防止白屏和卡顿
  async function renderAppAsync(processedData) {
    const { yearData, sortedYears, globalMaxDaily } = processedData;
    const app = document.getElementById('app');
    const tooltip = document.getElementById('tooltip');
    
    // 隐藏 Loader
    document.getElementById('loader').style.display = 'none';

    // 逐年渲染，每次渲染后向浏览器让出控制权 (yield)
    for (const year of sortedYears) {
      renderYearBlock(year, yearData[year], globalMaxDaily, app, tooltip);
      // 等待一个宏任务周期，让浏览器有时间把刚才生成的 DOM 画在屏幕上
      await new Promise(resolve => setTimeout(resolve, 0));
    }
  }

  // --- 初始化 ---
  async function init() {
    try {
      const res = await fetch(DATA_URL);
      const runs = await res.json();
      
      const processedData = processRunData(runs);
      renderAppAsync(processedData);

    } catch (error) {
      console.error('Data load failed:', error);
      document.getElementById('loader').innerHTML = '<p style="color:#e74c3c;">数据获取失败，请刷新页面。</p>';
    }
  }

  init();
</script>
</body>
</html>
